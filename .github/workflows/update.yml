name: 📈 Portfolio 자동 업데이트

on:
  schedule:
    # 평일(월~금) 오전 10시 KST = UTC 01:00
    - cron: '0 1 * * 1-5'
  workflow_dispatch:
    # GitHub 레포 Actions 탭에서 수동 실행 버튼 생성
    inputs:
      reason:
        description: '수동 실행 사유 (선택)'
        required: false
        default: '수동 업데이트'

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 레포 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 한국어 폰트 설치
        run: |
          sudo apt-get update -q
          sudo apt-get install -y fonts-nanum -q

      - name: 📦 패키지 설치
        run: |
          pip install --upgrade pip
          pip install notion-client==1.0.0 requests matplotlib pandas python-dateutil yfinance

      - name: 📊 포트폴리오 업데이트 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:  ${{ github.repository }}
        run: python index_analysis.py

      - name: ✅ 완료 알림
        run: echo "✅ Portfolio 업데이트 완료 - $(date '+%Y-%m-%d %H:%M KST')"
